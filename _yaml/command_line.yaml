- sensor:
    name: CPU Temperature
    unique_id: cli_cpu_temperature
    command: "cat /sys/class/thermal/thermal_zone0/temp"
    # If errors occur, make sure configuration file is encoded as UTF-8
    unit_of_measurement: "°C"
    value_template: "{{ value | multiply(0.001) | round(1) }}"

- sensor:
    name: External IP Address
    unique_id: cli_external_ip_address
    command: "curl -s https://api.ipify.org"
    scan_interval: 300

- sensor:
    name: Git Status
    unique_id: cli_git_status
    command: "/bin/bash /config/scripts/git_status.sh 2"
    value_template: "{{ value_json.state }}"
    json_attributes:
      - branch
      - ahead
      - behind
      - commit_hash
      - commit_message
      - commit_date
      - stash_count
      - has_changes
      - untracked_files
      - has_conflicts
      - should_pull
      - manual_intervention
    scan_interval: 300