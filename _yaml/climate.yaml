- platform: generic_thermostat
  name: RPI Cooling Fan Controller
  unique_id: rpi_cooling_fan_controller
  heater: switch.rpi_cooling_fan
  target_sensor: sensor.cpu_temperature
  min_temp: 20
  max_temp: 40
  target_temp: 30
  target_temp_step: 1
  ac_mode: true
  cold_tolerance: 0.5
  hot_tolerance: 0.5
  min_cycle_duration:
    seconds: 300
  keep_alive:
    minutes: 5
  initial_hvac_mode: "cool"
